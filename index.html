<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nabíjecí stanice</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #161616;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #555;
    --free: #16f26e;
    --free-bg: rgba(22,242,110,0.13);
    --free-border: rgba(22,242,110,0.45);
    --busy: #ff3b3b;
    --busy-bg: rgba(255,59,59,0.13);
    --busy-border: rgba(255,59,59,0.45);
    --fault: #ffb300;
    --fault-bg: rgba(255,179,0,0.13);
    --fault-border: rgba(255,179,0,0.45);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 28px 20px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .live-dot {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .live-dot::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--free);
    animation: pulse 2s infinite;
  }

  .live-dot.loading::before { background: var(--fault); animation: none; opacity: 0.6; }
  .live-dot.error::before   { background: var(--busy);  animation: none; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  main {
    flex: 1;
    padding: 24px 20px;
    max-width: 540px;
    width: 100%;
    margin: 0 auto;
  }

  .summary {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .summary-item { display: flex; flex-direction: column; gap: 3px; }

  .summary-count {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    line-height: 1;
  }

  .summary-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .free-count  { color: var(--free); }
  .busy-count  { color: var(--busy); }
  .fault-count { color: var(--fault); }

  .orient {
    margin-bottom: 20px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
  }

  .orient-diagram {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .orient-slots {
    display: flex;
    gap: 4px;
  }

  .orient-slot {
    width: 32px;
    height: 20px;
    border: 1px solid #3a3a3a;
    border-radius: 3px;
    background: #1e1e1e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .orient-arrow {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  .orient-note {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.04em;
    line-height: 1.5;
  }

  .grid { display: flex; flex-direction: column; gap: 8px; }

  .station {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.2s, background 0.2s;
  }

  .station.free  { border-color: var(--free-border);  background: var(--free-bg); }
  .station.busy  { border-color: var(--busy-border);  background: var(--busy-bg); }
  .station.fault { border-color: var(--fault-border); background: var(--fault-bg); }

  .station-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px 12px;
  }

  .station-id {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .station-status {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .status-dot { width: 7px; height: 7px; border-radius: 50%; }

  .free  .status-dot { background: var(--free); }
  .busy  .status-dot { background: var(--busy); }
  .fault .status-dot { background: var(--fault); }

  .free  .station-status { color: var(--free); }
  .busy  .station-status { color: var(--busy); }
  .fault .station-status { color: var(--fault); }

  .station-actions {
    display: flex;
    border-top: 1px solid var(--border);
  }

  .free  .station-actions { border-color: var(--free-border); }
  .busy  .station-actions { border-color: var(--busy-border); }
  .fault .station-actions { border-color: var(--fault-border); }

  .action-btn {
    flex: 1;
    padding: 13px 6px;
    background: transparent;
    border: none;
    border-right: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    -webkit-tap-highlight-color: transparent;
  }

  .free  .action-btn { border-right-color: var(--free-border); }
  .busy  .action-btn { border-right-color: var(--busy-border); }
  .fault .action-btn { border-right-color: var(--fault-border); }

  .action-btn:last-child { border-right: none; }
  .action-btn:active { background: rgba(255,255,255,0.05); }

  .action-btn.active          { color: var(--text); font-weight: 500; }
  .action-btn.active.set-free  { color: var(--free);  background: rgba(22,242,110,0.12); }
  .action-btn.active.set-busy  { color: var(--busy);  background: rgba(255,59,59,0.12); }
  .action-btn.active.set-fault { color: var(--fault); background: rgba(255,179,0,0.12); }

  .action-btn.saving { opacity: 0.4; pointer-events: none; }

  .updated {
    font-size: 10px;
    color: var(--muted);
    padding: 0 18px 12px;
    display: none;
  }

  .station.has-time .updated { display: block; }

  /* skeleton loader */
  .skeleton { animation: shimmer 1.4s infinite; }
  @keyframes shimmer {
    0%,100% { opacity: 0.15; }
    50%      { opacity: 0.35; }
  }

  footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: #1c1c1c;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 18px;
    border-radius: 6px;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Místa A–F · vedle handicap stání</div>
    <h1>Nabíjecí stanice</h1>
  </div>
  <div class="live-dot loading" id="live">NAČÍTÁM</div>
</header>

<main>
  <div class="summary">
    <div class="summary-item">
      <span class="summary-count free-count"  id="cnt-free">—</span>
      <span class="summary-label">Volné</span>
    </div>
    <div class="summary-item">
      <span class="summary-count busy-count"  id="cnt-busy">—</span>
      <span class="summary-label">Obsazené</span>
    </div>
    <div class="summary-item">
      <span class="summary-count fault-count" id="cnt-fault">—</span>
      <span class="summary-label">Mimo provoz</span>
    </div>
  </div>

  <div class="orient">
    <div class="orient-diagram">
      <div class="orient-slots">
        <div class="orient-slot">A</div>
        <div class="orient-slot">B</div>
        <div class="orient-slot">C</div>
        <div class="orient-slot">D</div>
        <div class="orient-slot">E</div>
        <div class="orient-slot">F</div>
      </div>
      <div class="orient-arrow">← vjezd</div>
    </div>
    <p class="orient-note">Místa jsou označena zleva doprava při pohledu z ulice Poláčkova</p>
  </div>

  <div class="grid" id="grid">
    <!-- skeleton -->
    <div class="station skeleton" style="height:86px;border-radius:6px"></div>
    <div class="station skeleton" style="height:86px;border-radius:6px"></div>
    <div class="station skeleton" style="height:86px;border-radius:6px"></div>
    <div class="station skeleton" style="height:86px;border-radius:6px"></div>
    <div class="station skeleton" style="height:86px;border-radius:6px"></div>
    <div class="station skeleton" style="height:86px;border-radius:6px"></div>
  </div>
</main>

<footer>
  <span id="footer-time">—</span>
  <span>6 stanic</span>
</footer>

<div class="toast" id="toast"></div>

<script>
  // ─── KONFIGURACE ───────────────────────────────────────────────
  // Sem vlož URL svého Apps Script webové aplikace
  const SCRIPT_URL = 'VLOZ_SVOJI_APPS_SCRIPT_URL_ZDE';
  // ──────────────────────────────────────────────────────────────

  const LABELS   = { free: 'Volná', busy: 'Obsazená', fault: 'Mimo provoz' };
  const SLOT_IDS = ['A', 'B', 'C', 'D', 'E', 'F']; // fyzické pořadí od vjezdu
  let state = [];
  let toastTimer;

  function fmt(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
  }

  function updateSummary() {
    document.getElementById('cnt-free').textContent  = state.filter(s=>s.status==='free').length;
    document.getElementById('cnt-busy').textContent  = state.filter(s=>s.status==='busy').length;
    document.getElementById('cnt-fault').textContent = state.filter(s=>s.status==='fault').length;
  }

  function updateFooter() {
    const last = state.filter(s=>s.updated).sort((a,b)=>new Date(b.updated)-new Date(a.updated))[0];
    document.getElementById('footer-time').textContent = last
      ? `Poslední změna ${fmt(last.updated)}`
      : 'Zatím žádná změna';
  }

  function renderStation(idx) {
    const s = state[idx];
    const el = document.getElementById(`st-${idx}`);
    if (!el) return;
    el.className = `station ${s.status}${s.updated ? ' has-time' : ''}`;
    el.querySelector('.station-status').innerHTML =
      `<span class="status-dot"></span>${LABELS[s.status]}`;
    el.querySelector('.updated').textContent = s.updated ? `Aktualizováno ${fmt(s.updated)}` : '';
    el.querySelectorAll('.action-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.s === s.status);
      b.classList.remove('saving');
    });
  }

  function buildGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    state.forEach((s, i) => {
      const d = document.createElement('div');
      d.id = `st-${i}`;
      d.className = `station ${s.status}${s.updated ? ' has-time' : ''}`;
      d.innerHTML = `
        <div class="station-header">
          <span class="station-id">Místo ${SLOT_IDS[i]}</span>
          <span class="station-status"><span class="status-dot"></span>${LABELS[s.status]}</span>
        </div>
        <div class="updated">${s.updated ? `Aktualizováno ${fmt(s.updated)}` : ''}</div>
        <div class="station-actions">
          <button class="action-btn set-free  ${s.status==='free'  ?'active':''}" data-s="free"  data-i="${i}">Volná</button>
          <button class="action-btn set-busy  ${s.status==='busy'  ?'active':''}" data-s="busy"  data-i="${i}">Obsazená</button>
          <button class="action-btn set-fault ${s.status==='fault' ?'active':''}" data-s="fault" data-i="${i}">Mimo provoz</button>
        </div>`;
      grid.appendChild(d);
    });
  }

  async function setStatus(idx, newStatus) {
    if (state[idx].status === newStatus) return;

    // Optimistic update
    state[idx].status  = newStatus;
    state[idx].updated = new Date().toISOString();
    renderStation(idx);
    updateSummary();
    updateFooter();

    // Mark saving
    document.getElementById(`st-${idx}`)
      .querySelectorAll('.action-btn')
      .forEach(b => b.classList.add('saving'));

    try {
      const url = `${SCRIPT_URL}?action=set&id=${state[idx].id}&status=${newStatus}`;
      await fetch(url, { method: 'GET', mode: 'no-cors' });
      showToast(`Místo ${SLOT_IDS[idx]} → ${LABELS[newStatus]}`);
    } catch {
      showToast('Chyba uložení — zkus znovu');
    } finally {
      document.getElementById(`st-${idx}`)
        .querySelectorAll('.action-btn')
        .forEach(b => b.classList.remove('saving'));
    }
  }

  async function loadState() {
    const live = document.getElementById('live');
    try {
      const res  = await fetch(`${SCRIPT_URL}?action=get`);
      const json = await res.json();
      state = json;
      buildGrid();
      updateSummary();
      updateFooter();
      live.textContent = 'LIVE';
      live.className   = 'live-dot';
    } catch {
      // Fallback — offline demo mode
      state = Array.from({length:6},(_,i)=>({id:i+1,status:'free',updated:null}));
      buildGrid();
      updateSummary();
      live.textContent = 'OFFLINE';
      live.className   = 'live-dot error';
    }
  }

  // Tap handler (event delegation)
  document.getElementById('grid').addEventListener('click', e => {
    const btn = e.target.closest('.action-btn');
    if (!btn) return;
    setStatus(+btn.dataset.i, btn.dataset.s);
  });

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
  }

  // Auto-refresh každé 2 minuty
  loadState();
  setInterval(loadState, 120_000);
</script>
</body>
</html>
