<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nabíjecí stanice</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f4f2;
    --surface: #ffffff;
    --border: #ddddd8;
    --text: #111111;
    --muted: #888880;
    --free: #0a8f3c;
    --free-bg: rgba(10,143,60,0.08);
    --free-border: rgba(10,143,60,0.35);
    --busy: #cc1f1f;
    --busy-bg: rgba(204,31,31,0.07);
    --busy-border: rgba(204,31,31,0.35);
    --fault: #b36a00;
    --fault-bg: rgba(179,106,0,0.08);
    --fault-border: rgba(179,106,0,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 28px 20px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .live-dot {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .live-dot::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--free);
    animation: pulse 2s infinite;
  }

  .live-dot.loading::before { background: var(--fault); animation: none; opacity: 0.6; }
  .live-dot.error::before   { background: var(--busy);  animation: none; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  main {
    flex: 1;
    padding: 24px 20px;
    max-width: 540px;
    width: 100%;
    margin: 0 auto;
  }

  .summary {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .summary-item { display: flex; flex-direction: column; gap: 3px; }

  .summary-count {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    line-height: 1;
  }

  .summary-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .free-count  { color: var(--free); }
  .busy-count  { color: var(--busy); }
  .fault-count { color: var(--fault); }

  .orient {
    margin-bottom: 20px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
  }

  .orient-diagram { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .orient-slots   { display: flex; gap: 4px; }

  .orient-slot {
    width: 32px; height: 20px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 10px; font-weight: 700;
    color: var(--muted);
  }

  .orient-arrow { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; white-space: nowrap; }
  .orient-note  { font-size: 10px; color: var(--muted); letter-spacing: 0.04em; line-height: 1.5; }

  .grid { display: flex; flex-direction: column; gap: 8px; }

  .station {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.2s, background 0.2s;
  }

  .station.free  { border-color: var(--free-border);  background: var(--free-bg); }
  .station.busy  { border-color: var(--busy-border);  background: var(--busy-bg); }
  .station.fault { border-color: var(--fault-border); background: var(--fault-bg); }

  .station-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px 10px;
  }

  .station-id {
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700;
    letter-spacing: 0.04em;
  }

  .station-status {
    display: flex; align-items: center; gap: 7px;
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  }

  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  .free  .status-dot { background: var(--free); }
  .busy  .status-dot { background: var(--busy); }
  .fault .status-dot { background: var(--fault); }
  .free  .station-status { color: var(--free); }
  .busy  .station-status { color: var(--busy); }
  .fault .station-status { color: var(--fault); }

  /* Meta row: badge + time */
  .meta-row {
    padding: 0 18px 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .driver-badge {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 3px;
    background: rgba(204,31,31,0.10);
    color: var(--busy);
    border: 1px solid var(--busy-border);
  }

  .updated-time { font-size: 10px; color: var(--muted); margin-left: auto; }

  /* Driver toggle — only when busy */
  .driver-row {
    display: none;
    padding: 0 18px 10px;
    gap: 6px;
  }

  .station.busy .driver-row { display: flex; }

  .driver-btn {
    flex: 1;
    padding: 7px 4px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .driver-btn.active {
    background: rgba(204,31,31,0.10);
    border-color: var(--busy-border);
    color: var(--busy);
    font-weight: 500;
  }

  /* Note field — only when busy */
  .note-row {
    display: none;
    padding: 0 18px 12px;
  }

  .station.busy .note-row { display: block; }

  .note-label {
    display: block;
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .note-input {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text);
    resize: none;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.4;
  }

  .note-input::placeholder { color: var(--muted); }
  .note-input:focus { border-color: var(--busy-border); }

  .station-actions {
    display: flex;
    border-top: 1px solid var(--border);
  }

  .free  .station-actions { border-color: var(--free-border); }
  .busy  .station-actions { border-color: var(--busy-border); }
  .fault .station-actions { border-color: var(--fault-border); }

  .action-btn {
    flex: 1;
    padding: 12px 6px;
    background: transparent;
    border: none;
    border-right: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .free  .action-btn { border-right-color: var(--free-border); }
  .busy  .action-btn { border-right-color: var(--busy-border); }
  .fault .action-btn { border-right-color: var(--fault-border); }

  .action-btn:last-child  { border-right: none; }
  .action-btn:active      { background: rgba(0,0,0,0.04); }
  .action-btn.active      { color: var(--text); font-weight: 500; }
  .action-btn.active.set-free  { color: var(--free);  background: rgba(10,143,60,0.10); }
  .action-btn.active.set-busy  { color: var(--busy);  background: rgba(204,31,31,0.10); }
  .action-btn.active.set-fault { color: var(--fault); background: rgba(179,106,0,0.10); }
  .action-btn.saving { opacity: 0.4; pointer-events: none; }

  .skeleton { animation: shimmer 1.4s infinite; }
  @keyframes shimmer { 0%,100%{opacity:0.12} 50%{opacity:0.28} }

  footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    font-size: 10px; color: var(--muted); letter-spacing: 0.06em;
  }

  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: #ffffff;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 18px;
    border-radius: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Místa A–F · vedle handicap stání</div>
    <h1>Nabíjecí stanice</h1>
  </div>
  <div class="live-dot loading" id="live">NAČÍTÁM</div>
</header>

<main>
  <div class="summary">
    <div class="summary-item">
      <span class="summary-count free-count"  id="cnt-free">—</span>
      <span class="summary-label">Volné</span>
    </div>
    <div class="summary-item">
      <span class="summary-count busy-count"  id="cnt-busy">—</span>
      <span class="summary-label">Obsazené</span>
    </div>
    <div class="summary-item">
      <span class="summary-count fault-count" id="cnt-fault">—</span>
      <span class="summary-label">Mimo provoz</span>
    </div>
  </div>

  <div class="orient">
    <div class="orient-diagram">
      <div class="orient-slots">
        <div class="orient-slot">A</div>
        <div class="orient-slot">B</div>
        <div class="orient-slot">C</div>
        <div class="orient-slot">D</div>
        <div class="orient-slot">E</div>
        <div class="orient-slot">F</div>
      </div>
      <div class="orient-arrow">← vjezd</div>
    </div>
    <p class="orient-note">Místa jsou označena zleva doprava při pohledu z ulice Poláčkova</p>
  </div>

  <div class="grid" id="grid">
    <div class="station skeleton" style="height:90px;border-radius:6px"></div>
    <div class="station skeleton" style="height:90px;border-radius:6px"></div>
    <div class="station skeleton" style="height:90px;border-radius:6px"></div>
    <div class="station skeleton" style="height:90px;border-radius:6px"></div>
    <div class="station skeleton" style="height:90px;border-radius:6px"></div>
    <div class="station skeleton" style="height:90px;border-radius:6px"></div>
  </div>
</main>

<footer>
  <span id="footer-time">—</span>
  <span>6 stanic</span>
</footer>

<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxXV1I6t1X-Ab-4ejxgt1B-3JfYHpwS031PjJZHH0I1G_yHl5GxbwMRb7C-LVLyPXvz/exec';

  const LABELS   = { free: 'Volná', busy: 'Obsazená', fault: 'Mimo provoz' };
  const SLOT_IDS = ['A', 'B', 'C', 'D', 'E', 'F'];
  const DRIVERS  = { fleet: 'Autoprovoz', employee: 'Zaměstnanec' };

  let state = [];
  let toastTimer;

  function fmt(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
  }

  function updateSummary() {
    document.getElementById('cnt-free').textContent  = state.filter(s=>s.status==='free').length;
    document.getElementById('cnt-busy').textContent  = state.filter(s=>s.status==='busy').length;
    document.getElementById('cnt-fault').textContent = state.filter(s=>s.status==='fault').length;
  }

  function updateFooter() {
    const last = state.filter(s=>s.updated).sort((a,b)=>new Date(b.updated)-new Date(a.updated))[0];
    document.getElementById('footer-time').textContent = last
      ? `Poslední změna ${fmt(last.updated)}`
      : 'Zatím žádná změna';
  }

  function buildGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    state.forEach((s, i) => {
      const el = document.createElement('div');
      el.id        = `st-${i}`;
      el.className = `station ${s.status}`;
      el.innerHTML = `
        <div class="station-header">
          <span class="station-id">Místo ${SLOT_IDS[i]}</span>
          <span class="station-status"><span class="status-dot"></span>${LABELS[s.status]}</span>
        </div>
        <div class="meta-row" id="meta-${i}" style="display:none">
          <span class="driver-badge" id="badge-${i}"></span>
          <span class="updated-time" id="utime-${i}"></span>
        </div>
        <div class="driver-row" id="drow-${i}">
          <button class="driver-btn" data-d="fleet"    data-i="${i}">🚗 Autoprovoz</button>
          <button class="driver-btn" data-d="employee" data-i="${i}">👤 Zaměstnanec</button>
        </div>
        <div class="note-row" id="nrow-${i}">
          <span class="note-label">Poznámka (dobrovolné)</span>
          <textarea class="note-input" id="note-${i}" rows="2"
            placeholder="Čas odjezdu, tel. číslo…" data-i="${i}"></textarea>
        </div>
        <div class="station-actions">
          <button class="action-btn set-free"  data-s="free"  data-i="${i}">Volná</button>
          <button class="action-btn set-busy"  data-s="busy"  data-i="${i}">Obsazená</button>
          <button class="action-btn set-fault" data-s="fault" data-i="${i}">Mimo provoz</button>
        </div>`;
      grid.appendChild(el);
      applyState(i);
    });

    document.querySelectorAll('.note-input').forEach(ta => {
      ta.addEventListener('blur', () => {
        const i   = +ta.dataset.i;
        const val = ta.value.trim();
        if (val === (state[i].note || '')) return;
        state[i].note = val;
        saveToSheet(i);
      });
    });
  }

  function applyState(i) {
    const s  = state[i];
    const el = document.getElementById(`st-${i}`);
    if (!el) return;

    el.className = `station ${s.status}`;
    el.querySelector('.station-status').innerHTML =
      `<span class="status-dot"></span>${LABELS[s.status]}`;

    // action buttons
    el.querySelectorAll('.action-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.s === s.status));

    // driver buttons
    el.querySelectorAll('.driver-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.d === s.driver));

    // note textarea (don't overwrite if focused)
    const ta = document.getElementById(`note-${i}`);
    if (ta && document.activeElement !== ta) ta.value = s.note || '';

    // meta row
    const meta  = document.getElementById(`meta-${i}`);
    const badge = document.getElementById(`badge-${i}`);
    const utime = document.getElementById(`utime-${i}`);

    const showMeta = s.status === 'busy' && (s.driver || s.updated);
    meta.style.display = showMeta ? 'flex' : 'none';
    badge.textContent  = s.driver ? (DRIVERS[s.driver] || s.driver) : '';
    badge.style.display = s.driver ? '' : 'none';
    utime.textContent  = s.updated ? `od ${fmt(s.updated)}` : '';
  }

  async function setStatus(i, newStatus) {
    if (state[i].status === newStatus) return;

    state[i].status  = newStatus;
    state[i].updated = new Date().toISOString();
    if (newStatus !== 'busy') { state[i].driver = null; state[i].note = ''; }

    applyState(i);
    updateSummary();
    updateFooter();

    el_saving(i, true);
    await saveToSheet(i);
    el_saving(i, false);
    showToast(`Místo ${SLOT_IDS[i]} → ${LABELS[newStatus]}`);
  }

  async function setDriver(i, driver) {
    state[i].driver = state[i].driver === driver ? null : driver;
    applyState(i);
    await saveToSheet(i);
  }

  async function saveToSheet(i) {
    const s = state[i];
    try {
      const note   = encodeURIComponent(s.note   || '');
      const driver = encodeURIComponent(s.driver || '');
      await fetch(
        `${SCRIPT_URL}?action=set&id=${s.id}&status=${s.status}&driver=${driver}&note=${note}`,
        { method: 'GET', mode: 'no-cors' }
      );
    } catch { showToast('Chyba uložení — zkus znovu'); }
  }

  function el_saving(i, on) {
    document.getElementById(`st-${i}`)
      .querySelectorAll('.action-btn')
      .forEach(b => b.classList.toggle('saving', on));
  }

  async function loadState() {
    const live = document.getElementById('live');
    try {
      const res  = await fetch(`${SCRIPT_URL}?action=get`);
      const json = await res.json();
      const prev = state;
      state = json.map((s, i) => {
        // preserve live note textarea value if user is typing
        const ta = document.getElementById(`note-${i}`);
        const liveNote = ta && document.activeElement === ta ? ta.value : (s.note || '');
        return { ...s, driver: s.driver || null, note: liveNote };
      });
      if (prev.length) { state.forEach((_, i) => applyState(i)); }
      else             { buildGrid(); }
      updateSummary();
      updateFooter();
      live.textContent = 'LIVE';
      live.className   = 'live-dot';
    } catch {
      if (!state.length) {
        state = Array.from({length:6},(_,i)=>({id:i+1,status:'free',updated:null,driver:null,note:''}));
        buildGrid();
        updateSummary();
      }
      live.textContent = 'OFFLINE';
      live.className   = 'live-dot error';
    }
  }

  document.getElementById('grid').addEventListener('click', e => {
    const ab = e.target.closest('.action-btn');
    if (ab) { setStatus(+ab.dataset.i, ab.dataset.s); return; }
    const db = e.target.closest('.driver-btn');
    if (db) { setDriver(+db.dataset.i, db.dataset.d); return; }
  });

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
  }

  loadState();
  setInterval(loadState, 120_000);
</script>
</body>
</html>
